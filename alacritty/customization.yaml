- name: Alacritty (customization)
  hosts: 127.0.0.1
  connection: local

  vars:
    is_mac: "{{ ansible_distribution == 'MacOSX' }}"

  tasks:
    - set_fact: is_wsl={{ not is_mac and lookup('file', '/proc/version') is regex('(M|m)icrosoft') }}

    - name: "[Non-WSL] Ensure Alacritty configuration folder exists"
      file:
        path: ~/.config/alacritty
        state: directory
      when: not is_wsl

    - name: "[Non-WSL] Update ~/.config/alacritty/alacritty.toml"
      copy:
        dest: ~/.config/alacritty/alacritty.toml
        content: |
          # Colors (Iris)

          # Default colors
          [colors.primary]
          background = '#272537'
          foreground = '#e8e6e9'

          # Normal colors
          [colors.normal]
          black   = '#111133'
          red     = '#d61d52'
          green   = '#48a842'
          yellow  = '#e1a51c'
          blue    = '#5556d3'
          magenta = '#8650d3'
          cyan    = '#52afb7'
          white   = '#9f9aa7'

          # Bright colors
          [colors.bright]
          black   = '#484867'
          red     = '#e15877'
          green   = '#71ab3a'
          yellow  = '#c6a642'
          blue    = '#6d6dc9'
          magenta = '#956ad3'
          cyan    = '#6ab6bd'
          white   = '#e8e6e9'


          # Light Theme
          # [colors.bright]
          # black = "0xb5bbae"
          # blue = "0x3465a4"
          # cyan = "0x06989a"
          # green = "0x4e9a06"
          # magenta = "0x75507b"
          # red = "0xae5e5e"
          # white = "0x2e3436"
          # yellow = "0x9b7f00"

          # [colors.normal]
          # black = "0xeeeeee"
          # blue = "0x729fcf"
          # cyan = "0x2ec3c3"
          # green = "0x79c32e"
          # magenta = "0xad7fa8"
          # red = "0xf49797"
          # white = "0x696b67"
          # yellow = "0xc4a000"

          # [colors.primary]
          # background = "0xeeeeee"
          # foreground = "0x696b67"

          [font]
          size = 12.0

          [font.normal]
          family = "JetBrainsMono Nerd Font Mono"

          [[keyboard.bindings]]
          action = "SpawnNewInstance"
          key = "T"
          mods = "Control|Shift"

          [window]
          decorations = "full"
          dynamic_padding = true
          startup_mode = "Maximized"

          [window.dimensions]
          columns = 160
          lines = 50

          [window.padding]
          x = 8
          y = 8
      when: not is_wsl

    # macOS
    - name: Set Alacritty 'thin lines' (macOS)
      ## Note: we use shell vs osx_defaults so we can run this file on non-mac machiens
      shell:
        cmd: defaults write org.alacritty AppleFontSmoothing -int 0
      when: is_mac
