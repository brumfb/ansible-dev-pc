- name: Starship
  hosts: 127.0.0.1
  connection: local

  vars:
    starship_version: v1.18.2
    is_mac: "{{ ansible_distribution == 'MacOSX' }}"

  tasks:
    - set_fact: is_wsl={{ not is_mac and lookup('file', '/proc/version') is regex('(M|m)icrosoft') }}

  # Common
    - name: Create binary folder
      become: yes
      file:
        path: /opt/starship/{{ starship_version }}
        state: directory

  # Linux
    - name: Install Starship (Linux)
      become: yes
      unarchive:
        src: https://github.com/starship/starship/releases/download/{{ starship_version }}/starship-x86_64-unknown-linux-musl.tar.gz
        dest: /opt/starship/{{ starship_version }}
        remote_src: yes
        creates: /opt/starship/{{ starship_version }}/starship
      when: not is_mac

    - name: Set Starship binary ownership to root
      become: yes
      file:
        path: /opt/starship/{{ starship_version }}/starship
        owner: root
        group: root
      when: not is_mac

  # MacOS
    - name: Install Starship (macOS)
      become: yes
      unarchive:
        src: https://github.com/starship/starship/releases/download/{{ starship_version }}/starship-aarch64-apple-darwin.tar.gz
        dest: /opt/starship/{{ starship_version }}
        remote_src: yes
        creates: /opt/starship/{{ starship_version }}/starship
      when: is_mac

  # Common
    - name: Create symlink to /usr/local/bin/starship
      become: yes
      file:
        path: /usr/local/bin/starship
        src: /opt/starship/{{ starship_version }}/starship
        state: link

    - name: Ensure ~/.config folder exists
      file:
        path: ~/.config
        state: directory
        mode: 0700

    - name: Copy starship.toml to ~/.config
      copy:
        src: starship.toml
        dest: ~/.config/starship.toml

    - name: Add Starship to shell startup
      blockinfile:
        path: ~/.bashrc
        marker: "### {mark} Ansible managed: Starship"
        block: |
          eval "$(starship init bash)"
