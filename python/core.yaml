- name: Python
  hosts: 127.0.0.1
  connection: local

  vars:
    python_dep_packages:
      - make
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - wget
      - curl
      - llvm
      - libncurses5-dev
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - liblzma-dev

  tasks:
    - name: Install pyenv
      git:
        dest: ~/.pyenv
        repo: https://github.com/pyenv/pyenv

    - name: Install pyenv-virtualenv
      git:
        dest: ~/.pyenv/plugins/pyenv-virtualenv
        repo: https://github.com/pyenv/pyenv-virtualenv

    - name: Enable pyenv
      blockinfile:
        path: ~/.bashrc
        marker: "### {mark} Ansible managed: pyenv support"
        block: |
          export PYENV_ROOT=$HOME/.pyenv
          export PATH=$PATH:$PYENV_ROOT/bin:$PYENV_ROOT/plugins/pyenv-virtualenv/bin
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"

    - name: Install Python dependeant APT package
      become: yes
      apt:
        package: "{{ item }}"
      loop: "{{ python_dep_packages }}"
      when:

