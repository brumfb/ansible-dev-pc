- import_playbook: ../rust-lang/core.yaml    # diffr is installed with Rust's cargo package manager

- name: git (customization)
  hosts: 127.0.0.1
  connection: local

  tasks:
    - name: Install diffr
      command: ~/.cargo/bin/cargo install diffr
      args:
        creates: ~/.cargo/bin/diffr

    - name: Install difftastic
      command: ~/.cargo/bin/cargo install difftastic
      args:
        creates: ~/.cargo/bin/difft

    - name: Download git-completion.bash
      get_url:
        url:  https://raw.githubusercontent.com/git/git/master/contrib/completion/git-completion.bash
        dest: ~/.git-completion.bash

    - name: Add bash completion for git
      blockinfile:
        path: ~/.bashrc
        marker: "### {mark} Ansible managed: git-completion.bash"
        block: |
          if [ -f ~/.git-completion.bash ]; then
            . ~/.git-completion.bash
          fi

    - name: Download bash-git-prompt
      git:
        repo: https://github.com/magicmonty/bash-git-prompt
        dest: ~/.bash-git-prompt

    - name: Enable bash-git-prompt
      blockinfile:
        path: ~/.bashrc
        marker: "### {mark} Ansible managed: Enable bash-git-prompt"
        block: |
          GIT_PROMPT_THEME=Default
          GIT_PROMPT_FETCH_REMOTE_STATUS=0

          source ~/.bash-git-prompt/gitprompt.sh
          source ~/.bash-git-prompt/prompt-colors.sh

    - name: Add bash-git-prompt customization
      blockinfile:
        path: ~/.bashrc
        marker: "### {mark} Ansible managed: bash-git-prompt customization"
        block: |
          function findHereOrParent() {
            path=$(pwd)
            while [[ "$path" != "" && ! $(find "$path" -maxdepth 1 -regex "$1") ]]; do
              path=${path%/*}
            done
            echo "$path"
          }

          function echoError() {
            echo -ne "\033[38;5;131;48;5;0mоВЇ\033[38;5;227;48;5;131m пАН ${1} \033[38;5;0;48;5;131mоВЇ"
          }

          function echoRubyVersion() {
            if [[ $(which ruby) && $(findHereOrParent '.*/Gemfile') ]]; then
              CURRENT_RUBY=$((ruby --version 2>/tmp/ruby-version || echo "xxx оАЙ¬†$(grep -o '[[:digit:]]\(\.[[:digit:]]\)\{1,\}' /tmp/ruby-version)¬†оАЙ") | awk '{ print $2; exit; }')
              echo -ne "\033[38;5;52;48;5;0mоВЇ\033[38;5;210;48;5;52m оИЮ \033[38;5;254m${CURRENT_RUBY} \033[38;5;0;48;5;52mоВЇ"
            fi
          }

          function echoPythonVersion() {
            if [[ $(which pyenv) && $(findHereOrParent '.*\.py') ]]; then
              CURRENT_PYTHON=$(pyenv version-name)
              echo -ne "\033[38;5;221;48;5;0mоВЇ\033[38;5;25;48;5;221m оИµ \033[38;5;16m${CURRENT_PYTHON} \033[38;5;0;48;5;221mоВЇ"
            fi
          }

          function echoGoVersion() {
            if [[ $(which go) && $(findHereOrParent '.*/go\.mod') ]]; then
              CURRENT_GO=$(go version | awk '{print $3; exit;}' | cut -c3-)
              echo -ne "\033[38;5;80;48;5;0mоВЇ\033[38;5;16;48;5;80m оШІ ${CURRENT_GO} \033[38;5;0;48;5;80mоВЇ"
            fi
          }

          function echoRustVersion() {
            if [[ $(which rustc) && $(findHereOrParent '.*/Cargo\.toml') ]]; then
              CURRENT_RUST=$(rustc --version | awk '{print $2; exit;}')
              echo -ne "\033[38;5;172;40mоВЇ\033[38;5;231;48;5;172m оЮ® ${CURRENT_RUST} \033[38;5;0;48;5;172mоВЇ"
            fi
          }

          function echoDotNetVersion() {
            if [[ $(which dotnet) && $(findHereOrParent '.*\.\(sln\|csproj\)') ]]; then
              CURRENT_DOTNET=$(dotnet --version)
              echo -ne "\033[38;5;54;48;5;0mоВЇ\033[38;5;231;48;5;54m оЭњ ${CURRENT_DOTNET} \033[38;5;0;48;5;54mоВЇ"
            fi
          }

          function echoPath() {
            echo -ne "\033[38;5;28;48;5;0mоВЇ\033[38;5;227;48;5;28m пС• \033[38;5;254m$(dirs +0) \033[38;5;0;48;5;28mоВЇ"
          }

          function echoColor() {
            echo -ne "\033[48;5;${1};38;5;${2}m"
          }

          # Configuration
          GIT_PROMPT_SHOW_UNTRACKED_FILES="all"
          GIT_PROMPT_IGNORE_STASH="1"
          GIT_PROMPT_LEADING_SPACE="0"

          # Pre- and post-status prompt strings
          GIT_PROMPT_COMMAND_FAIL=" \`echoError _LAST_COMMAND_STATE_\`"
          GIT_PROMPT_COMMAND_OK=" "
          GIT_PROMPT_START_USER="${ResetColor}_LAST_COMMAND_INDICATOR_\`echoRubyVersion\`\`echoPythonVersion\`\`echoGoVersion\`\`echoRustVersion\`\`echoDotNetVersion\`"
          GIT_PROMPT_START_ROOT="${GIT_PROMPT_START_USER}"
          GIT_PROMPT_END_USER="\`echoPath\`${ResetColor}¬†\n${BoldGreen} sh$ ${ResetColor}"
          GIT_PROMPT_END_ROOT="\`echoPath\`${ResetColor}¬†\n${BoldRed} sh# ${ResetColor}"

          # Individual overrides
          GIT_PROMPT_BRANCH="\`echoColor 25 110\`оЬ•\`echoColor 25 254\` "
          GIT_PROMPT_CHANGED="\`echoColor 25 227\` ~"
          GIT_PROMPT_CLEAN=""
          GIT_PROMPT_CONFLICTS="\`echoColor 25 210\` оАЙ "
          GIT_PROMPT_PREFIX="\`echoColor 0 25\`оВЇ\`echoColor 25 0\` "
          GIT_PROMPT_REMOTE=""
          GIT_PROMPT_SEPARATOR=""
          GIT_PROMPT_STAGED="\`echoColor 25 113\` ¬±"
          GIT_PROMPT_STASHED="\`echoColor 25 110\` пАЃ "
          GIT_PROMPT_SUFFIX="\`echoColor 25 0\` оВЇ"
          GIT_PROMPT_UNTRACKED="\`echoColor 25 227\` +"

          # Symbols
          GIT_PROMPT_SYMBOLS_AHEAD="\`echoColor 25 110\` пБҐ"
          GIT_PROMPT_SYMBOLS_BEHIND="\`echoColor 25 110\` пБ£"
          GIT_PROMPT_SYMBOLS_NO_REMOTE_TRACKING="\`echoColor 25 227\` пАН"
          GIT_PROMPT_SYMBOLS_PREHASH=":"

    - name: Custom .gitconfig
      blockinfile:
        path: ~/.gitconfig
        create: true
        marker: "### {mark} Ansible managed: .gitconfig customization"
        block: |
          [alias]
            amend = commit -a --amend
            bclean = "!f() { git branch --merged ${1-main} | grep -v " ${1-main}$" | xargs git branch -d; }; f"
            bdone = "!f() { git checkout ${1-main} && git up && git bclean ${1-main}; }; f"
            cm = !git add -A && git commit -m
            co = checkout
            cob = checkout -b
            ec = config --global -e
            h = !git log --graph --decorate --format=format:'%C(bold blue)%h%C(reset) - %C(bold cyan)%aD%C(reset) %C(bold green)(%ar)%C(reset)%C(bold yellow)%d%C(reset)%n'' %C(white)%s%C(reset) %C(dim white)- %an%C(reset)' --all
            l = log --pretty=format:\"%h %ad | %s%d [%an]\" --date=short
            lg = log --pretty=format:\"%h %ad | %s%d [%an]\" --graph --date=short
            out = log --pretty=format:\"%h %ad | %s%d [%an]\" --date=short @{u}..
            pr = "!f() { git fetch origin refs/pull/$1/head:pr/$1; } ; f"
            save = !git add -A && git commit -m 'SAVEPOINT'
            scorch = clean -xdf -e packages -e .nuget -e nuget.exe -e *.dbmdl -e *.suo -e *.user -e .vs -e .vagrant -e .dotnet -e .idea -e .vscode
            skip = rebase --skip
            st = status
            stats = diff --stat
            sup = !git submodule foreach 'git pull origin master'
            undo = reset HEAD~1 --mixed
            up = !git pull --rebase --prune $@ && git submodule update --init --recursive
            wip = !git add -u && git commit -m "WIP"
            wipe = !git add -A && git commit -qm 'WIPE SAVEPOINT' && git reset HEAD~1 --hard

    - name: Ensure ~/.config exists
      file:
        path: ~/.config
        state: directory
        mode: 0700

    - name: Create ~/.config/ripgrep
      copy:
        dest: ~/.config/ripgrep
        mode: 0755
        content: |
          --hidden

    - name: Set ripgrep configuration path
      lineinfile:
        path: ~/.bashrc
        line: export RIPGREP_CONFIG_PATH=$HOME/.config/ripgrep

